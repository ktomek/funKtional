name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.0)'
        required: true

jobs:
  publish:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew jvmTest --no-daemon

      - name: Configure signing
        run: |
          mkdir -p ~/.gradle
          KEY=$(echo "${{ secrets.SIGNING_KEY }}" | base64 --decode)
          KEY="${KEY//$'\n'/\\n}"
          echo "signingInMemoryKey=${KEY}" >> ~/.gradle/gradle.properties
          echo "signingInMemoryKeyId=${{ secrets.SIGNING_KEY_ID }}" >> ~/.gradle/gradle.properties
          echo "signingInMemoryKeyPassword=${{ secrets.SIGNING_PASSWORD }}" >> ~/.gradle/gradle.properties

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral -PpublishVersion=${{ inputs.version }} --no-daemon
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Tag release
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
