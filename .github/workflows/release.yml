name: Create GitHub Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true

      - name: Publish artifacts to local repo
        run: ./gradlew publishAllPublicationsToLocalRepoRepository --no-daemon

      - name: Push artifacts to maven-repo branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git fetch origin maven-repo || git checkout --orphan maven-repo
          git checkout maven-repo 2>/dev/null || true
          cp -r build/repo/. .
          git add com/
          git commit -m "Publish ${{ github.ref_name }}"
          git push origin maven-repo
